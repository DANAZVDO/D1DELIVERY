{% extends "menu/base.html" %}

{% block title %}Editar Item — {{ restaurant.name }}{% endblock %}

{% block extra_head %}
<style>
body { background: #f1f5f9; }
.dash-header {
    background: linear-gradient(160deg, #0f172a 0%, #1e293b 60%, #312e81 100%);
    color: white; padding: 1rem 1rem;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.dash-header h1 { font-size: 1.05rem; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
.dash-header a { opacity: 0.75; transition: opacity 0.2s; }
.dash-header a:hover { opacity: 1; }
.dash-content { padding: 1rem; max-width: 460px; margin: 0 auto; }
.edit-card {
    background: white; border-radius: 16px; padding: 1.25rem;
    border: 1px solid #e2e8f0;
}
.edit-card .form-control, .edit-card .form-select {
    border-radius: 10px; padding: 0.55rem 0.85rem;
    border: 1.5px solid #e2e8f0; font-size: 0.9rem;
}
.edit-card .form-control:focus { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.08); }
.preview-img { width: 100px; height: 100px; border-radius: 14px; object-fit: cover; background: #f1f5f9; }
.btn-save {
    width: 100%; padding: 0.7rem; border-radius: 14px;
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    color: white; border: none; font-weight: 700; margin-top: 0.25rem;
}
</style>
{% endblock %}

{% block content %}
<div class="dash-header">
    <div class="d-flex align-items-center gap-3">
        <a href="{% url 'dashboard_menu' %}" class="text-white text-decoration-none">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1>Editar Item</h1>
    </div>
</div>

<div class="dash-content">
    <div class="edit-card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="text-center mb-3">
                {% if item.image %}
                <img src="{{ item.image.url }}" class="preview-img">
                {% else %}
                <div class="preview-img d-flex align-items-center justify-content-center" style="color:#cbd5e1;font-size:2rem;"><i class="bi bi-image"></i></div>
                {% endif %}
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Nome</label>
                <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Preço (R$)</label>
                <input type="number" name="price" class="form-control" step="0.01" min="0" value="{{ item.price }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Descrição</label>
                <textarea name="description" class="form-control" rows="2">{{ item.description }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Categoria</label>
                <select name="category_id" class="form-select">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if cat.id == item.category_id %}selected{% endif %}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Nova foto</label>
                <input type="file" name="image" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn-save">Salvar alterações</button>
        </form>
    </div>
</div>
{% endblock %}
