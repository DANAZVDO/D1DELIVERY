{% extends "menu/base.html" %}

{% block title %}Editar Perfil — D1 Delivery{% endblock %}

{% block extra_head %}
<style>
body { background: #f1f5f9; min-height: 100vh; }
.header-bar { background: linear-gradient(160deg, #0f172a 0%, #1e293b 60%, #312e81 100%); color: white; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; }
.header-bar h1 { font-size: 1.1rem; font-weight: 800; margin: 0; }
.header-bar a { color: white; opacity: 0.7; }
.content { padding: 1rem; max-width: 520px; margin: 0 auto; }
.edit-card { background: white; border-radius: 16px; padding: 1.5rem; border: 1px solid #e2e8f0; }
.edit-card .form-control { border-radius: 10px; padding: 0.6rem 0.85rem; border: 1.5px solid #e2e8f0; font-size: 0.9rem; }
.edit-card .form-control:focus { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.08); }
.edit-card .form-label { font-weight: 700; font-size: 0.82rem; color: #475569; }
.btn-save { width: 100%; padding: 0.7rem; border-radius: 14px; background: linear-gradient(135deg,#dc2626,#b91c1c); color: white; border: none; font-weight: 700; margin-top: 0.5rem; }
.alert { border-radius: 12px; font-size: 0.85rem; font-weight: 600; }
</style>
{% endblock %}

{% block content %}
<div class="header-bar">
    <a href="{% url 'customer_orders' %}"><i class="bi bi-arrow-left"></i></a>
    <h1>Editar Perfil</h1>
</div>

<div class="content">
    {% if messages %}{% for m in messages %}<div class="alert alert-success">{{ m }}</div>{% endfor %}{% endif %}

    <div class="edit-card">
        <form method="post">{% csrf_token %}
            <div class="mb-3"><label class="form-label">Nome</label><input type="text" name="name" class="form-control" value="{{ user.first_name }}"></div>
            <div class="mb-3"><label class="form-label">WhatsApp</label><input type="text" name="phone" class="form-control" value="{{ profile.phone }}"></div>
            <div class="mb-3"><label class="form-label">Endereço</label><input type="text" name="address" class="form-control" value="{{ profile.address }}"></div>
            <div class="row g-3 mb-3">
                <div class="col-md-6"><label class="form-label">Bairro</label><input type="text" name="neighborhood" class="form-control" value="{{ profile.neighborhood }}"></div>
                <div class="col-md-6"><label class="form-label">Complemento</label><input type="text" name="complement" class="form-control" value="{{ profile.complement }}"></div>
            </div>
            <button type="submit" class="btn-save">Salvar alterações</button>
        </form>
    </div>
</div>
{% endblock %}
